<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Summarizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 680px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .upload-area {
            border: 2px dashed #333;
            border-radius: 12px;
            padding: 2.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .upload-area:hover {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.05);
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }

        .upload-text { color: #888; font-size: 0.9rem; }
        .upload-text span { color: #a78bfa; font-weight: 600; }

        #file-name {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: #60a5fa;
            font-weight: 500;
        }

        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .result {
            margin-top: 2rem;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.5rem;
            display: none;
        }

        .result h2 {
            font-size: 1rem;
            color: #a78bfa;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result p {
            color: #ccc;
            line-height: 1.75;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
            font-size: 0.9rem;
        }

        .spinner {
            width: 28px; height: 28px;
            border: 3px solid #333;
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 0.6rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 PDF Summarizer</h1>
        <p class="subtitle">Upload any PDF and get a clean, instant summary powered by AI.</p>

        <div class="upload-area">
            <input type="file" id="pdf-input" accept=".pdf" onchange="showFileName(this)">
            <div class="upload-icon">📂</div>
            <div class="upload-text">Drop your PDF here or <span>browse files</span></div>
            <div id="file-name"></div>
        </div>

        <button id="submit-btn" onclick="summarize()" disabled>Summarize PDF</button>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            Reading and summarizing your document...
        </div>

        <div class="result" id="result">
            <h2>✨ Summary</h2>
            <p id="summary-text"></p>
        </div>
    </div>

    <script>
        function showFileName(input) {
            const name = input.files[0]?.name || '';
            document.getElementById('file-name').textContent = name ? `Selected: ${name}` : '';
            document.getElementById('submit-btn').disabled = !name;
        }

        async function summarize() {
            const input = document.getElementById('pdf-input');
            if (!input.files[0]) return;

            const btn = document.getElementById('submit-btn');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');

            btn.disabled = true;
            loader.style.display = 'block';
            result.style.display = 'none';

            const formData = new FormData();
            formData.append('file', input.files[0]);

            try {
                const response = await fetch('/summarize', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                document.getElementById('summary-text').textContent = data.summary;
                result.style.display = 'block';
            } catch (err) {
                document.getElementById('summary-text').textContent = 'Something went wrong. Please try again.';
                result.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
